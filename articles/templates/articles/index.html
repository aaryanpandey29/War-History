{% load static %}
<link rel="stylesheet" href="{% static 'articles/style.css' %}" />
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Battles</title>
  </head>
  <body>
    <h1><a href="/articles/">Baattles.com</a></h1>
    {% if latest_articles %}
    <ul>
      {% for battle in latest_articles %}
      <li>
        <a href="/articles/{{ battle.id }}">{{ battle.Name }}</a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p>No articles are available.</p>
    {% endif %}
  </body>
</html>
