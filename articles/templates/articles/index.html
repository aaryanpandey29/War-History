{% load static %}
<link rel="stylesheet" href="{% static 'articles/style.css' %}" />
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Battles</title>
  </head>
  <body>
    {% if latest_articles %}
    <ul>
      {% for battle in latest_articles %}
      <li>
        <a href="{% url 'polls:detail' battle.id %}">{{ battle.title }}</a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p>No polls are available.</p>
    {% endif %}
  </body>
</html>
